name: Publish to npm

# Auto-publish when the version in package.json changes on master.
# Flow: bump "version" in package.json, commit, push -> this builds,
# typechecks, tests, and publishes ONLY if that version isn't on npm yet.
#
# Auth: npm trusted publishing (OIDC) — no NPM_TOKEN. Requires a trusted
# publisher to be configured for this package on npmjs.com pointing at
# udah1/cursor-chat-bridge + this workflow file (publish.yml).
# Provenance is generated automatically for OIDC publishes from public repos.
on:
  push:
    branches: [master]
    paths: ["package.json"]
  workflow_dispatch: {}

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push the release tag
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never cache in release builds

      # Trusted publishing needs npm >= 11.5.1 (newer than what Node bundles).
      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check if version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already published: $NAME@$VERSION"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "new version to publish: $NAME@$VERSION"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (OIDC)
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public

      - name: Tag the release
        if: steps.check.outputs.publish == 'true'
        run: |
          git tag "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
